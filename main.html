<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background-color: #f4f6f9;
    }
    .sidebar {
      height: 100vh;
      width: 250px;
      position: fixed;
      background-color: #212529;
      padding-top: 20px;
    }
    .sidebar a {
      color: #adb5bd;
      padding: 12px 20px;
      display: block;
      text-decoration: none;
    }
    .sidebar a:hover {
      background-color: #343a40;
      color: white;
    }
    .content {
      margin-left: 250px;
      padding: 20px;
    }
    .card img {
      width: 40px;
      margin-bottom: 10px;
    }
    .profile-img {
      width: 40px;
      border-radius: 50%;
    }
  </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h4 class="text-white text-center mb-4">Admin Panel</h4>
  <a href="#"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
  <a href="#"><i class="bi bi-cart me-2"></i> Orders</a>
  <a href="#"><i class="bi bi-people me-2"></i> Users</a>
  <a href="#"><i class="bi bi-mortarboard me-2"></i> Students</a>
  <a href="#"><i class="bi bi-bar-chart me-2"></i> Reports</a>
  <a href="#"><i class="bi bi-gear me-2"></i> Settings</a>
</div>

<!-- Main Content -->
<div class="content">

  <!-- Top Navbar -->
  <nav class="navbar navbar-light bg-white shadow-sm mb-4 rounded">
    <div class="container-fluid">
      <span class="navbar-brand">Dashboard Overview</span>
      <div>
        <img src="https://via.placeholder.com/40" class="profile-img">
        <span class="ms-2">Admin</span>
      </div>
    </div>
  </nav>

  <!-- Statistics Cards -->
  <div class="row g-3 mb-4">
    <div class="col-lg-3 col-md-6">
      <div class="card text-center shadow">
        <div class="card-body">
          <img src="https://img.icons8.com/color/48/sales-performance.png"/>
          <h5>Total Sales</h5>
          <h4>₹1,25,000</h4>
        </div>
      </div>
    </div>

    <div class="col-lg-3 col-md-6">
      <div class="card text-center shadow">
        <div class="card-body">
          <img src="https://img.icons8.com/color/48/purchase-order.png"/>
          <h5>Total Orders</h5>
          <h4>1,450</h4>
        </div>
      </div>
    </div>

    <div class="col-lg-3 col-md-6">
      <div class="card text-center shadow">
        <div class="card-body">
          <img src="https://img.icons8.com/color/48/student-center.png"/>
          <h5>Students</h5>
          <h4>820</h4>
        </div>
      </div>
    </div>

    <div class="col-lg-3 col-md-6">
      <div class="card text-center shadow">
        <div class="card-body">
          <img src="https://img.icons8.com/color/48/error.png"/>
          <h5>Pending</h5>
          <h4>35</h4>
        </div>
      </div>
    </div>
  </div>

  <!-- Table Section -->
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      Recent Students / Orders
    </div>
    <div class="card-body table-responsive">
      <table class="table table-striped align-middle">
        <thead>
          <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Course</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><img src="https://via.placeholder.com/40" class="rounded-circle"></td>
            <td>Rahul Sharma</td>
            <td>B.Tech</td>
            <td><span class="badge bg-success">Active</span></td>
          </tr>
          <tr>
            <td><img src="https://via.placeholder.com/40" class="rounded-circle"></td>
            <td>Priya Singh</td>
            <td>MBA</td>
            <td><span class="badge bg-warning">Pending</span></td>
          </tr>
          <tr>
            <td><img src="https://via.placeholder.com/40" class="rounded-circle"></td>
            <td>Amit Verma</td>
            <td>BCA</td>
            <td><span class="badge bg-danger">Inactive</span></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
